<html lang="en">
<head>

    <g stroke="#8a755a" stroke-width="0.6" fill="none" opacity="0.6">
      <line x1="35" y1="45" x2="65" y2="35"/>
      <line x1="35" y1="45" x2="55" y2="65"/>
      <line x1="65" y1="35" x2="75" y2="55"/>
      <line x1="55" y1="65" x2="75" y2="55"/>
      <line x1="35" y1="45" x2="25" y2="65"/>
      <line x1="65" y1="35" x2="50" y2="22"/>
    </g>
    <g>
      <circle cx="50" cy="22" r="2.5" fill="#b8431e"/>
      <circle cx="35" cy="45" r="4" fill="#2a5f6e"/>
      <circle cx="65" cy="35" r="5" fill="#b8431e"/>

<!-- Fonts (local; see vendor/fonts.css for original Google Fonts subsets) -->
<link rel="stylesheet" href="vendor/fonts.css">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="root"></div>
<div id="loading" class="loading">Charting the diaspora…</div>

<!-- React + Babel (vendored locally — no CDN) -->
<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>

<!-- D3 force + zoom (vendored locally) -->
<script src="vendor/d3.min.js"></script>

<!-- Data + UI -->
<script src="src/data.js"></script>
<script src="src/china-geo.js"></script>
<script src="src/roc-1911-geo.js"></script>
<script src="src/roc-1911-outline.js"></script>
<script src="src/all-countries-geo.js"></script>
<script src="src/sea-geo.js"></script>
<script src="src/world-geo.js"></script>
<script src="src/world-1900-geo.js"></script>
<script src="src/india-states-geo.js"></script>
<script src="src/hometowns.js"></script>
<script src="src/photos.js"></script>
<script src="src/caucasian-names.js"></script>
<script src="src/enrichment.js"></script>
<script type="text/babel" src="src/graph.jsx"></script>
<script type="text/babel" src="src/map.jsx"></script>
<script type="text/babel" src="src/world-modal.jsx"></script>
<script type="text/babel" src="src/sidebar.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
<script type="text/babel">
  // Mount once Babel has compiled the other scripts.
  // Babel compiles inline scripts synchronously when type="text/babel" — but
  // the external src files are fetched. We poll for App.
  const tryMount = () => {
    if (window.App && window.ForceGraph && window.BiographyCard && window.SearchBar && window.Legend && window.ChinaMap && window.WorldDiasporaModal) {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<window.App />);
      requestAnimationFrame(() => {
        const L = document.getElementById('loading');
        L.classList.add('gone');
        setTimeout(() => L.remove(), 500);
      });
    } else {
      setTimeout(tryMount, 30);
    }
  };
  tryMount();
</script>

</body>
</html>
